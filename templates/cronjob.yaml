kind: CronJob
apiVersion: batch/v1
metadata:
  name: cronjob-etcd-backup
  namespace: etcd-bkp
  labels:
    app.kubernetes.io/name: cronjob-etcd-backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  suspend: false
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: cronjob-etcd-backup
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cronjob-etcd-backup
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                    - key: node-role.kubernetes.io/master
                      operator: Exists
                  - matchExpressions:
                    - key: node-role.kubernetes.io/control-plane
                      operator: Exists
          restartPolicy: OnFailure
          activeDeadlineSeconds: 500
          serviceAccountName: cronjob-etcd-bkp-sa
          hostPID: true
          hostNetwork: true
          enableServiceLinks: true
          schedulerName: default-scheduler
          terminationGracePeriodSeconds: 30
          securityContext: {}
          # First step - take a backup and then clean up old local copies of backups
          initContainers:
            - name: cronjob-etcd-backup
              image: registry.redhat.io/openshift4/ose-cli
              terminationMessagePath: /dev/termination-log
              command:
              - /bin/bash
              - '-c'
              - |
                set -e;
                echo "--- Create etcd backup local to master ---";
                chroot /host /usr/local/bin/cluster-backup.sh /home/core/backup/$(date "+%F_%H%M%S");

                echo "--- Keep only the 3 most recent backups ---";
                chroot /host bash -c "ls -dt /home/core/backup/* | tail -n +4 | xargs -r rm -rf || true";
              securityContext:
                privileged: true
                runAsUser: 0
                capabilities:
                  add:
                    - SYS_CHROOT
              imagePullPolicy: Always
              volumeMounts:
                - name: host
                  mountPath: /host
              terminationMessagePolicy: File
          # Second step - Sync the files to S3, retaining only the most recent backups
          containers:
            - name: aws-cli
              image: amazon/aws-cli:latest
              command:
              - /bin/bash
              - '-c'
              - |
                echo "--- Syncing local backup folder to S3, retaining only the most recent backups ---";
                aws s3 sync /host/home/core/backup/ s3://ocp-etcd-sync \
                  --endpoint-url ${ENDPOINT_URL} \
                  --no-verify-ssl \
                  --delete;
              env:
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: aws-s3-etcd-key
                    key: aws_access_key_id
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: aws-s3-etcd-key
                    key: aws_secret_access_key
              - name: ENDPOINT_URL
                valueFrom:
                  secretKeyRef:
                    name: aws-s3-etcd-key
                    key: endpoint_url
              volumeMounts:
                - name: host
                  mountPath: /host
          volumes:
          - name: host
            hostPath:
              path: /
              type: Directory
          dnsPolicy: ClusterFirst
          tolerations:
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
