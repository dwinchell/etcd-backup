apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cronjob-etcd-bkp-cr
rules:
- apiGroups: [""]
  resources:
    -  "nodes"
  verbs: ["get","list"]
- apiGroups: [""]
  resources:
    - "pods"
    - "pods/log"
  verbs: ["get","list","create","delete","watch"]
- apiGroups: ["config.openshift.io"]
  resources: ["clusterversions"]
  verbs: ["get"]
